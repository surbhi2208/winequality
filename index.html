<!DOCTYPE html>
<html>
<head>

    <title>Wine Quality Prediction</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
            padding:40px;
        }

        .container{
            width:500px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
        }

        input{
            width:100%;
            padding:8px;
            margin:5px 0;
        }

        button{
            width:100%;
            padding:10px;
            background:green;
            color:white;
            border:none;
        }

        h2{
            text-align:center;
        }

    </style>

</head>

<body>

<div class="container">

<h2>Wine Quality Prediction</h2>

<form method="POST">

{% for feature in features %}

<label>{{feature}}</label>

<input type="number" step="any" name="{{feature}}" required>

{% endfor %}

<br><br>

<button type="submit">Predict</button>

</form>

{% if prediction %}

<h2>Predicted Quality : {{prediction}}</h2>

{% endif %}

</div>

</body>
</html>
